// ============================================================
// UTILS
// ============================================================
function fmt(n, decimals=0) {
  if (n === null || n === undefined) return '-';
  return Number(n).toLocaleString('zh-CN', {minimumFractionDigits: decimals, maximumFractionDigits: decimals});
}
function fmtW(n) { return fmt(n/10000, 1) + '万'; }
function fmtPct(n) { return fmt(n, 1) + '%'; }
function changeTag(val) {
  if (val > 5) return `<span class="change up">↑${fmtPct(val)}</span>`;
  if (val < -5) return `<span class="change down">↓${fmtPct(Math.abs(val))}</span>`;
  return `<span class="change" style="color:#ffa726">→${fmtPct(val)}</span>`;
}
function tierColor(tier) {
  const colors = {'超头部(100W+)':'#e53935','头部(30-100W)':'#ff7043','核心(5-30W)':'#ffa726','成材(2-5W)':'#66bb6a','潜力(1-2W)':'#42a5f5','长尾(<1W)':'#78909c','零流水':'#455a64'};
  return colors[tier] || '#78909c';
}
function groupColor(i) {
  const palette = ['#4fc3f7','#66bb6a','#ffa726','#ef5350','#ab47bc','#26c6da','#ff7043'];
  return palette[i % palette.length];
}

  ops.forEach(o => {
    const momVal = o['环比变化%'];
    const momTag = momVal > 5 ? `<span class="tag tag-green">↑${fmtPct(momVal)}</span>` : momVal < -5 ? `<span class="tag tag-red">↓${fmtPct(Math.abs(momVal))}</span>` : `<span class="tag tag-orange">${fmtPct(momVal)}</span>`;
    const depTag = o['头部依赖度%'] > 70 ? 'tag-red' : o['头部依赖度%'] > 40 ? 'tag-orange' : 'tag-green';
    html += `<tr onclick="drillToOperator('${groupName}','${o['运营']}')">
      <td>${o['运营']}</td><td>${fmtW(o['总流水'])}</td><td>${momTag}</td>
      <td>${o['开播主播数']}</td><td>${fmtW(o['主播人均流水'])}</td><td>${fmtPct(o['转化率%'])}</td>
      <td><span class="tag ${depTag}">${fmtPct(o['头部依赖度%'])}</span></td>
      <td>${o['超头部人数']||'-'}</td><td>${o['头部人数']||'-'}</td><td>${o['核心人数']}</td><td>${o['成材人数']}</td><td>${o['素人人数']}</td>
    </tr>`;
  });
  html += '</table>';
  document.getElementById('gt1').innerHTML = html;
  
  window.addEventListener('resize', () => { gc1.resize(); gc2.resize(); window._gc3?.resize(); });
}

// ============================================================
// RENDER: OPERATOR LEVEL (drill to anchors)
// ============================================================
function drillToOperator(groupName, opName) {
  currentLevel = 'operator';
  currentOperator = opName;
  
  const op = DATA.operators.find(o => o['小组'] === groupName && o['运营'] === opName);
  if (!op) return;
  const anchors = (DATA.drill_anchors[groupName] || {})[opName] || [];
  
  document.getElementById('kpi-row').innerHTML = `
    <div class="kpi-card"><div class="label">运营总流水</div><div class="value">${fmtW(op['总流水'])}</div>${changeTag(op['环比变化%'])}</div>
    <div class="kpi-card"><div class="label">开播主播</div><div class="value">${op['开播主播数']}</div><div class="change" style="color:#78909c">总 ${op['主播总数']}</div></div>
    <div class="kpi-card"><div class="label">人均流水</div><div class="value">${fmtW(op['主播人均流水'])}</div></div>
    <div class="kpi-card"><div class="label">转化率</div><div class="value">${fmtPct(op['转化率%'])}</div></div>
    <div class="kpi-card"><div class="label">头部依赖</div><div class="value" style="color:${op['头部依赖度%']>70?'#ef5350':op['头部依赖度%']>40?'#ffa726':'#66bb6a'}">${fmtPct(op['头部依赖度%'])}</div></div>
  `;
  
  document.getElementById('breadcrumb').innerHTML = `<span onclick="renderBranch()">🏢 成都第二</span> <span style="color:#546e7a">›</span> <span onclick="drillToGroup('${groupName}')">👥 ${groupName}</span> <span style="color:#546e7a">›</span> <span class="current">👤 ${opName}</span>`;
  
  const grid = document.getElementById('chart-grid');
  grid.innerHTML = `
    <div class="chart-box"><div class="chart-title">💰 TOP主播流水</div><div id="oc1" class="chart-container"></div></div>
    <div class="chart-box"><div class="chart-title">🎯 流水构成饼图</div><div id="oc2" class="chart-container"></div></div>
    <div class="chart-box full"><div class="chart-title">📋 主播明细 TOP10</div><div id="ot1" class="table-wrap"></div></div>
  `;
  
  if (anchors.length > 0) {
    const top = anchors.slice(0, 10);
    
    // Bar chart
    const oc1 = echarts.init(document.getElementById('oc1'));
    oc1.setOption({
      tooltip: { trigger: 'axis', formatter: p => `${p[0].name}<br/>流水: ${fmtW(p[0].value)}<br/>天数: ${top.find(a=>a.name===p[0].name)?.days||0}天` },
      xAxis: { type: 'category', data: top.map(a => a.name.length > 6 ? a.name.slice(0,6)+'..' : a.name), axisLabel: { color: '#78909c', fontSize: 10, rotate: 25 } },
      yAxis: { type: 'value', axisLabel: { color: '#546e7a', formatter: v => (v/10000).toFixed(0)+'万' }, splitLine: { lineStyle: { color: '#1e3a5f' } } },
      series: [{ type: 'bar', data: top.map((a,i) => ({ value: a.revenue, itemStyle: { color: groupColor(i), borderRadius: [4,4,0,0] } })), barWidth: '50%' }],
      grid: { left: 50, right: 10, top: 10, bottom: 60 }
    });
    
    // Pie
    const oc2 = echarts.init(document.getElementById('oc2'));
    oc2.setOption({
      tooltip: { formatter: p => `${p.name}<br/>${fmtW(p.value)} (${p.percent}%)` },
      series: [{ type: 'pie', radius: ['35%','68%'], center: ['50%','52%'],
        data: top.map((a,i) => ({ name: a.name.length > 8 ? a.name.slice(0,8)+'..' : a.name, value: a.revenue, itemStyle: { color: groupColor(i) } })),
        label: { color: '#b0bec5', fontSize: 10, formatter: '{b}\n{d}%' }, labelLine: { lineStyle: { color: '#546e7a' } }
      }]
    });
    
    // Table
    let html = '<table><tr><th>排名</th><th>主播</th><th>流水</th><th>开播天数</th><th>直播时长</th><th>日均流水</th></tr>';
    top.forEach((a, i) => {
      const dailyAvg = a.days > 0 ? a.revenue / a.days : 0;
      html += `<tr>
        <td style="text-align:center;color:#78909c">${i+1}</td>
        <td>${a.name}</td><td>${fmtW(a.revenue)}</td>
        <td>${a.days}天</td><td>${fmt(a.hours,1)}h</td><td>${fmtW(dailyAvg)}</td>
      </tr>`;
    });
    html += '</table>';
    document.getElementById('ot1').innerHTML = html;
    
    window.addEventListener('resize', () => { oc1.resize(); oc2.resize(); });
  } else {
    document.getElementById('ot1').innerHTML = '<div style="text-align:center;padding:40px;color:#546e7a">暂无主播明细数据</div>';
  }
}

// ============================================================
// INIT
// ============================================================
renderBranch();
</script>
