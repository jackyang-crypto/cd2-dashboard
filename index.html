<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>成都第二分公司 · 数据看板</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, 'PingFang SC', '微软雅黑', sans-serif; background: #f5f7fa; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
.container { max-width: 600px; width: 90%; }
.header { text-align: center; margin-bottom: 40px; }
.header h1 { font-size: 28px; color: #2c3e50; font-weight: 700; }
.header p { font-size: 14px; color: #8899aa; margin-top: 8px; }
.card {
  background: #fff; border-radius: 16px; padding: 28px 32px;
  margin-bottom: 16px; cursor: pointer; transition: all 0.3s;
  box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  text-decoration: none; display: block;
}
.card:hover { transform: translateY(-3px); box-shadow: 0 8px 24px rgba(102,126,234,0.18); }
.card .icon { font-size: 32px; margin-bottom: 10px; }
.card .title { font-size: 18px; font-weight: 600; color: #2c3e50; }
.card .desc { font-size: 13px; color: #8899aa; margin-top: 6px; line-height: 1.5; }
.card .tag { display: inline-block; font-size: 11px; padding: 3px 10px; border-radius: 12px; margin-top: 10px; font-weight: 500; }
.tag-purple { background: #f0f0ff; color: #667eea; }
.tag-green { background: #e6f9f0; color: #27ae60; }
.tag-blue { background: #e8f4fd; color: #3498db; }
.footer { text-align: center; font-size: 12px; color: #bbb; margin-top: 30px; }
</style>
</head>
<body>
<div class="container">
  <div class="header">
    <h1>📊 成都第二分公司</h1>
    <p>2026年4月 数据分析看板</p>
  </div>

  <a class="card" href="revenue.html">
    <div class="icon">💰</div>
    <div class="title">流水波动诊断</div>
    <div class="desc">四层下钻：分公司 → 小组 → 运营 → 主播<br>每日流水趋势 · 波动率分析 · 异常定位</div>
    <span class="tag tag-purple">折线图 / 柱状图 / 面积图</span>
  </a>

  <a class="card" href="cohort.html">
    <div class="icon">📅</div>
    <div class="title">入会年份构成分析</div>
    <div class="desc">各入会年份主播的流水贡献占比<br>堆积面积图 · 年份对比 · 结构洞察</div>
    <span class="tag tag-green">堆积图 / 交互下钻</span>
  </a>

  <a class="card" href="dau.html">
    <div class="icon">👥</div>
    <div class="title">日活趋势诊断</div>
    <div class="desc">四层下钻：分公司 → 小组 → 运营 → 主播<br>开播日活 / 1h100r日活 可切换 · 转化率分析</div>
    <span class="tag tag-blue">双指标切换 / 四层下钻</span>
  </a>

  <div class="footer">成都第二分公司 · 数据分析团队</div>
</div>
</body>
</html>
