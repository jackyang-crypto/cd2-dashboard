 function arrAvg(arr) {
   const nz = arr.filter(v => v > 0);
   return nz.length > 0 ? nz.reduce((a,b) => a+b, 0) / nz.length : 0;
 }
 function arrSum(arr) { return arr.reduce((a,b) => a+b, 0); }
 function arrMax(arr) { return Math.max(...arr); }
 function arrMin(arr) { const nz = arr.filter(v => v > 0); return nz.length > 0 ? Math.min(...nz) : 0; }

 function convRate(qArr, bArr) {
   const tq = arrSum(qArr);
   const tb = arrSum(bArr);
   return tb > 0 ? (tq / tb * 100) : 0;
 }

 function convBadge(rate) {
   if (rate >= 70) return { text: '高转化', cls: 'badge-high' };
   if (rate >= 40) return { text: '中转化', cls: 'badge-mid' };
   return { text: '低转化', cls: 'badge-low' };
 }

 function makeTooltip(params) {
   let h = `<div style="font-weight:600;margin-bottom:6px">${params[0].name}</div>`;
   const s = [...params].sort((a,b) => b.value - a.value).filter(p => p.value > 0);
   s.slice(0, 12).forEach(p => {
     h += `<div style="display:flex;justify-content:space-between;gap:16px;margin:2px 0;font-size:13px">
       <span>${p.marker} ${p.seriesName}</span>
       <span style="font-weight:600">${p.value}人</span></div>`;
   });
   if (s.length > 12) h += `<div style="color:#999;margin-top:4px">...还有 ${s.length-12} 项</div>`;
   return h;
 }

   else if (currentLevel === 'group') drillToGroup(currentGroup);
   else if (currentLevel === 'operator') drillToOperator(currentOperator);
 }

 function setChartType(type) {
   chartType = type;
   document.querySelectorAll('.chart-actions button').forEach(b => b.classList.remove('active'));
   document.getElementById('btn' + type.charAt(0).toUpperCase() + type.slice(1)).classList.add('active');
   if (currentLevel === 'branch') renderBranchLevel();
   else if (currentLevel === 'group') drillToGroup(currentGroup);
   else if (currentLevel === 'operator') drillToOperator(currentOperator);
 }

 // ============ Level 0: Branch ============
 function renderBranchLevel() {
   currentLevel = 'branch'; currentGroup = null; currentOperator = null; highlightedSeries = null;
   const dates = DATA.dates.map(fmtDate);
   const m = currentMetric;
   const mLabel = METRIC_LABELS[m];

   // Sort groups by avg DAU descending
   const groups = Object.entries(DATA.groups)
     .map(([name, info]) => [name, info, arrAvg(info[m])])
     .sort((a, b) => b[2] - a[2]);

   // Sidebar
   let sb = `<div class="sidebar-title">📋 各小组（按日均${mLabel}排序）</div>`;
   groups.forEach(([name, info, avg]) => {
     const cr = convRate(info.qualified, info.broadcast);
     const b = convBadge(cr);
     const ops = Object.keys(info.operators).length;
     sb += `<div class="sidebar-item" onclick="drillToGroup('${name.replace(/'/g,"\\'")}')">
       <div><div class="name">${name}</div>
       <div class="value">日均 ${avg.toFixed(1)}人 · ${ops}运营 · 转化 ${cr.toFixed(1)}%</div></div>
       <span class="badge ${b.cls}">${b.text}</span></div>`;
   });
   document.getElementById('sidebar').innerHTML = sb;

   document.getElementById('breadcrumb').innerHTML = '<span class="breadcrumb-item active">🏢 成都第二分公司</span>';
   document.getElementById('chartTitle').textContent = `成都第二分公司 · 每日${mLabel}趋势`;
   document.getElementById('chartDesc').textContent = `总${mLabel}趋势 + 各小组堆叠 · 点击左侧或双击图表下钻到小组`;

   // Chart
   const branchDaily = DATA.branch[m];
   const series = [{
     name: '分公司总计', type: 'line', data: branchDaily, smooth: true,
     lineStyle: { width: 3, color: '#2c3e50' }, itemStyle: { color: '#2c3e50' },
     symbol: 'circle', symbolSize: 5, z: 10
   }];
   groups.forEach(([name, info], i) => {
     series.push({
       name, type: 'line', stack: 'groups', data: info[m], smooth: true,
       lineStyle: { width: 0 }, symbol: 'none',
       areaStyle: { opacity: 0.6 }, itemStyle: { color: COLORS[i % COLORS.length] },
       emphasis: { focus: 'series' }
     });
   });

   chart.setOption({
     tooltip: { trigger: 'axis', formatter: makeTooltip },
     legend: { data: ['分公司总计', ...groups.map(([n])=>n)], textStyle: { fontSize: 11, color: '#666' }, top: 5, type: 'scroll' },
     grid: { left: '3%', right: '3%', bottom: '10%', top: '50px', containLabel: true },
     xAxis: { type: 'category', data: dates, axisLabel: { color: '#888', fontSize: 11, rotate: 45 }, axisLine: { lineStyle: { color: '#ddd' } } },
     yAxis: { type: 'value', minInterval: 1, axisLabel: { color: '#888', formatter: v => v + '人' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
     series,
     dataZoom: [
       { type: 'inside', start: 0, end: 100 },
       { type: 'slider', start: 0, end: 100, height: 20, bottom: 5, borderColor: '#ddd', fillerColor: 'rgba(102,126,234,0.15)', handleStyle: { color: '#667eea' }, textStyle: { color: '#888' } }
     ]
   }, true);
   chart.off('dblclick');
   chart.on('dblclick', p => { if (p.seriesName && DATA.groups[p.seriesName]) drillToGroup(p.seriesName); });

   const avg = arrAvg(branchDaily);
   const mx = arrMax(branchDaily);
   const mn = arrMin(branchDaily);
   const cr = convRate(DATA.branch.qualified, DATA.branch.broadcast);
   document.getElementById('statsBar').innerHTML = `
     <div class="stat-card"><div class="stat-value">${avg.toFixed(1)}</div><div class="stat-label">月均${mLabel}</div></div>
     <div class="stat-card"><div class="stat-value">${mx}</div><div class="stat-label">最高日</div></div>
     <div class="stat-card"><div class="stat-value">${mn}</div><div class="stat-label">最低日</div></div>
     <div class="stat-card"><div class="stat-value">${groups.length}</div><div class="stat-label">活跃小组</div></div>
     <div class="stat-card"><div class="stat-value">${cr.toFixed(1)}%</div><div class="stat-label">转化率</div></div>`;
 }

 // ============ Level 1: Group ============
 function drillToGroup(groupName) {
   currentLevel = 'group'; currentGroup = groupName; currentOperator = null; highlightedSeries = null;
   const gi = DATA.groups[groupName];
   const m = currentMetric;
   const mLabel = METRIC_LABELS[m];
   const dates = DATA.dates.map(fmtDate);

   const ops = Object.entries(gi.operators)
     .map(([name, info]) => [name, info, arrAvg(info[m])])
     .sort((a, b) => b[2] - a[2]);

   let sb = `<div class="sidebar-title">👤 ${groupName} · 运营列表</div>`;
   ops.forEach(([name, info, avg]) => {
     const cr = convRate(info.qualified, info.broadcast);
     const b = convBadge(cr);
     const ac = Object.keys(info.anchors).length;
     sb += `<div class="sidebar-item" onclick="drillToOperator('${name.replace(/'/g,"\\'")}')">
       <div><div class="name">${name}</div>
       <div class="value">日均 ${avg.toFixed(1)}人 · ${ac}主播 · 转化 ${cr.toFixed(1)}%</div></div>
       <span class="badge ${b.cls}">${b.text}</span></div>`;
   });
   document.getElementById('sidebar').innerHTML = sb;

   document.getElementById('breadcrumb').innerHTML = `
     <span class="breadcrumb-item" onclick="renderBranchLevel()">🏢 成都第二</span>
     <span class="breadcrumb-sep">›</span>
     <span class="breadcrumb-item active">👥 ${groupName}</span>`;
   document.getElementById('chartTitle').textContent = `${groupName} · 各运营每日${mLabel}`;
   document.getElementById('chartDesc').textContent = '点击左侧或双击折线下钻到主播层级';

   const series = ops.map(([name, info], i) => ({
     name, type: chartType === 'area' ? 'line' : chartType, data: info[m], smooth: true,
     symbol: 'circle', symbolSize: 5, lineStyle: { width: 2.5 },
     areaStyle: chartType === 'area' ? { opacity: 0.15 } : undefined,
     itemStyle: { color: COLORS[i % COLORS.length] },
     emphasis: { focus: 'series', lineStyle: { width: 5 } }
   }));

   chart.setOption({
     tooltip: { trigger: 'axis', formatter: makeTooltip },
     legend: { data: ops.map(([n])=>n), textStyle: { fontSize: 11, color: '#666' }, top: 5, type: 'scroll' },
     grid: { left: '3%', right: '3%', bottom: '10%', top: '50px', containLabel: true },
     xAxis: { type: 'category', data: dates, axisLabel: { color: '#888', fontSize: 11, rotate: 45 }, axisLine: { lineStyle: { color: '#ddd' } } },
     yAxis: { type: 'value', minInterval: 1, axisLabel: { color: '#888', formatter: v => v + '人' }, splitLine: { lineStyle: { color: '#f0f0f0' } } },
     series,
     dataZoom: [
       { type: 'inside', start: 0, end: 100 },
       { type: 'slider', start: 0, end: 100, height: 20, bottom: 5, borderColor: '#ddd', fillerColor: 'rgba(102,126,234,0.15)', handleStyle: { color: '#667eea' }, textStyle: { color: '#888' } }
     ]
   }, true);
   chart.off('dblclick');
   chart.on('dblclick', p => { if (p.seriesName && gi.operators[p.seriesName]) drillToOperator(p.seriesName); });

   const gDaily = gi[m];
   const avg = arrAvg(gDaily);
   const mx = arrMax(gDaily);
   const mn = arrMin(gDaily);
   const cr = convRate(gi.qualified, gi.broadcast);
   document.getElementById('statsBar').innerHTML = `
     <div class="stat-card"><div class="stat-value">${avg.toFixed(1)}</div><div class="stat-label">日均${mLabel}</div></div>
     <div class="stat-card"><div class="stat-value">${mx}</div><div class="stat-label">最高日</div></div>
     <div class="stat-card"><div class="stat-value">${mn}</div><div class="stat-label">最低日</div></div>
     <div class="stat-card"><div class="stat-value">${ops.length}</div><div class="stat-label">运营人数</div></div>
     <div class="stat-card"><div class="stat-value">${cr.toFixed(1)}%</div><div class="stat-label">转化率</div></div>`;
 }

 // ============ Level 2: Operator → Anchors ============
 function drillToOperator(opName) {
   currentLevel = 'operator'; currentOperator = opName; highlightedSeries = null;
   const oi = DATA.groups[currentGroup].operators[opName];
   const m = currentMetric;
   const mLabel = METRIC_LABELS[m];
   const dates = DATA.dates.map(fmtDate);

   const anchors = Object.entries(oi.anchors)
     .map(([key, info]) => [key, info, info['total_' + m + '_days'] || arrSum(info[m])])
     .sort((a, b) => b[2] - a[2]);

   let sb = `<div class="sidebar-title">🎤 ${opName} · 主播列表</div>`;
   anchors.forEach(([key, info]) => {
     const bDays = info.total_broadcast_days;
     const qDays = info.total_qualified_days;
     const cr = bDays > 0 ? (qDays / bDays * 100) : 0;
     const b = convBadge(cr);
     const shortId = info.id.length > 12 ? info.id.slice(0,12)+'...' : info.id;
     sb += `<div class="sidebar-item" onclick="highlightAnchor('${key.replace(/'/g,"\\'")}')">
       <div><div class="name">${info.name}</div>
       <div class="sub-id" title="${info.id}">ID: ${shortId}</div>
       <div class="value">开播 ${bDays}天 · 达标 ${qDays}天 · 转化 ${cr.toFixed(1)}%</div></div>
       <span class="badge ${b.cls}">${b.text}</span></div>`;
   });
   document.getElementById('sidebar').innerHTML = sb;

   document.getElementById('breadcrumb').innerHTML = `
     <span class="breadcrumb-item" onclick="renderBranchLevel()">🏢 成都第二</span>
     <span class="breadcrumb-sep">›</span>
     <span class="breadcrumb-item" onclick="drillToGroup('${currentGroup.replace(/'/g,"\\'")}')">👥 ${currentGroup}</span>
     <span class="breadcrumb-sep">›</span>
     <span class="breadcrumb-item active">👤 ${opName}</span>`;
   document.getElementById('chartTitle').textContent = `${currentGroup} · ${opName} · 各主播每日${mLabel}`;
   document.getElementById('chartDesc').textContent = m === 'broadcast'
     ? '1=开播 0=未开播 · 点击左侧主播高亮显示'
     : '1=达标 0=未达标 · 点击左侧主播高亮显示';

   const maxShow = 15;
   const show = anchors.slice(0, maxShow);
   const rest = anchors.slice(maxShow);

   const series = show.map(([key, info], i) => ({
     name: info.name, type: chartType === 'area' ? 'line' : chartType, data: info[m], smooth: false,
     symbol: 'circle', symbolSize: 5, lineStyle: { width: 2 }, step: 'middle',
     areaStyle: chartType === 'area' ? { opacity: 0.1 } : undefined,
     itemStyle: { color: COLORS[i % COLORS.length] },
     emphasis: { focus: 'series', lineStyle: { width: 5 } }
   }));

   if (rest.length > 0) {
     const otherDaily = DATA.dates.map((_, i) => rest.reduce((s, [, info]) => s + info[m][i], 0));
     series.push({
       name: `其他(${rest.length}人)`, type: 'line', data: otherDaily,
       smooth: true, symbol: 'none', lineStyle: { width: 1.5, type: 'dashed' },
       itemStyle: { color: '#bbb' }, emphasis: { focus: 'series' }
     });
   }

   chart.setOption({
     tooltip: {
       trigger: 'axis',
       formatter: function(params) {
         let h = `<div style="font-weight:600;margin-bottom:6px">${params[0].name}</div>`;
         const s = [...params].sort((a,b) => b.value - a.value);
         s.slice(0, 10).forEach(p => {
           const statusText = m === 'broadcast'
             ? (p.value === 1 ? '✅ 开播' : '❌ 未开播')
             : (p.value === 1 ? '✅ 达标' : '❌ 未达标');
           h += `<div style="display:flex;justify-content:space-between;gap:14px;margin:2px 0;font-size:13px">
             <span>${p.marker} ${p.seriesName}</span>
             <span style="font-weight:600">${statusText}</span></div>`;
         });
         if (s.length > 10) h += `<div style="color:#999;margin-top:4px">...还有 ${s.length-10} 人</div>`;
         return h;
       }
     },
     legend: { data: series.map(s => s.name), textStyle: { fontSize: 10, color: '#666' }, top: 5, type: 'scroll' },
     grid: { left: '3%', right: '3%', bottom: '10%', top: '50px', containLabel: true },
     xAxis: { type: 'category', data: dates, axisLabel: { color: '#888', fontSize: 11, rotate: 45 }, axisLine: { lineStyle: { color: '#ddd' } } },
     yAxis: {
       type: 'value', min: 0, max: 1, interval: 1,
       axisLabel: { color: '#888', formatter: function(v) { return v === 1 ? '是' : v === 0 ? '否' : ''; } },
       splitLine: { lineStyle: { color: '#f0f0f0' } }
     },
     series,
     dataZoom: [
       { type: 'inside', start: 0, end: 100 },
       { type: 'slider', start: 0, end: 100, height: 20, bottom: 5, borderColor: '#ddd', fillerColor: 'rgba(102,126,234,0.15)', handleStyle: { color: '#667eea' }, textStyle: { color: '#888' } }
     ]
   }, true);
   chart.off('dblclick');
   chart.on('dblclick', () => { highlightedSeries = null; chart.dispatchAction({ type: 'downplay' }); });

   const ac = anchors.length;
   const totalBDays = anchors.reduce((s, [,info]) => s + info.total_broadcast_days, 0);
   const totalQDays = anchors.reduce((s, [,info]) => s + info.total_qualified_days, 0);
   const crAll = totalBDays > 0 ? (totalQDays / totalBDays * 100) : 0;
   const opDaily = oi[m];
   const avg = arrAvg(opDaily);
   const mx = arrMax(opDaily);
   const mn = arrMin(opDaily);

   document.getElementById('statsBar').innerHTML = `
     <div class="stat-card"><div class="stat-value">${avg.toFixed(1)}</div><div class="stat-label">日均${mLabel}</div></div>
     <div class="stat-card"><div class="stat-value">${mx}</div><div class="stat-label">最高日</div></div>
     <div class="stat-card"><div class="stat-value">${mn}</div><div class="stat-label">最低日</div></div>
     <div class="stat-card"><div class="stat-value">${ac}</div><div class="stat-label">主播数</div></div>
     <div class="stat-card"><div class="stat-value">${crAll.toFixed(1)}%</div><div class="stat-label">转化率</div></div>`;
 }

 function highlightAnchor(key) {
   const ops = DATA.groups[currentGroup].operators[currentOperator];
   const info = ops.anchors[key];
   if (!info) return;
   if (highlightedSeries === info.name) {
     highlightedSeries = null;
     chart.dispatchAction({ type: 'downplay' });
     return;
   }
   highlightedSeries = info.name;
   chart.dispatchAction({ type: 'downplay' });
   chart.dispatchAction({ type: 'highlight', seriesName: info.name });
 }
 </script>
</body>
</html>
